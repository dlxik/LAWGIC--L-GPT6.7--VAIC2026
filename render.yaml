# Render Blueprint — deploy LAWGIC API (Docker) len goi Free.
# Neo4j KHONG chay o day: dung Neo4j AuraDB Free (managed), set NEO4J_* ben duoi.
# Cach dung: Render Dashboard -> New -> Blueprint -> tro toi repo nay.
# Cac bien sync:false phai dien tay trong Dashboard (secret, khong commit).
services:
  - type: web
    name: lawgic-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Neo4j Aura Free (lay tu man hinh tao instance) ---
      - key: NEO4J_URI          # vd: neo4j+s://xxxxxxxx.databases.neo4j.io
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD     # mat khau Aura sinh ra luc tao instance
        sync: false

      # --- LLM (FPT AI Marketplace, tuong thich OpenAI SDK) ---
      - key: LLM_BASE_URL
        value: https://mkp-api.fptcloud.com
      - key: LLM_API_KEY        # key FPT cua ban
        sync: false
      - key: LLM_MODEL
        value: gpt-oss-20b

      # --- Rate limit ---
      # Render dat sau proxy -> IP that nam trong X-Forwarded-For.
      # =1 de gioi han theo TUNG nguoi dung (khong thi ca 10 nguoi chung 1 IP proxy).
      - key: RATELIMIT_TRUST_XFF
        value: "1"
