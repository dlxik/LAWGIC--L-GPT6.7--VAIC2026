name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) Lint — CHAN build (khong con advisory). Code khong sach -> do.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint (blocking)
        run: ruff check backend/ eval/ scripts/ tests/

  # 2) Tests — chay CA 26 test graph voi Neo4j that (khong con SKIP), + coverage gate.
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      neo4j:
        image: neo4j:5.25-community
        env:
          NEO4J_AUTH: neo4j/ci-test-password
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p ci-test-password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      # Test graph doc 2 bien nay; ALLOW_WIPE=1 mo khoa cac test wipe graph (an toan: DB ephemeral cua CI).
      NEO4J_URI: bolt://localhost:7687
      NEO4J_PASSWORD: ci-test-password
      ALLOW_WIPE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov
      - name: Tests (Neo4j-backed) + coverage
        # Voi Neo4j that, 26 test graph chay that -> tong ~118 test, khong con SKIP vi thieu DB.
        run: pytest --cov=backend --cov-report=term-missing --cov-fail-under=40

  # 3) Docker — chung minh "docker compose up" khong phai loi hua: image phai build duoc.
  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t lawgic-api:ci ./backend
